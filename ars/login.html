<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sri Arvind School | Portal Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="login-body">

  <div id="app-loader" class="loader-overlay" style="visibility: hidden; opacity: 0;">
    <div class="loader-spinner"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card glass-panel" data-aos="fade-up">
      <div class="login-header">
        <a href="/index.html">
          <img src="https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=100&h=100&fit=crop" alt="Sri Arvind Logo">
        </a>
        <h3 class="font-title mt-3 mb-1">Sri Arvind Portals</h3>
        <p class="text-muted small">Please select your portal and enter credentials.</p>
      </div>

      <div class="px-4 pb-4">
        <!-- Role Selection Tabs -->
        <div class="login-tabs">
          <button type="button" class="login-tab-btn active" data-role="admin"><i class="fas fa-user-shield me-2"></i>Admin</button>
          <button type="button" class="login-tab-btn" data-role="teacher"><i class="fas fa-chalkboard-teacher me-2"></i>Teacher</button>
          <button type="button" class="login-tab-btn" data-role="student"><i class="fas fa-user-graduate me-2"></i>Student</button>
        </div>

        <form id="portalLoginForm">
          <div class="form-floating mb-3">
            <input type="email" class="form-control" id="loginEmail" placeholder="name@school.com" required>
            <label for="loginEmail">Email Address</label>
          </div>
          
          <div class="form-floating mb-4">
            <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
            <label for="loginPassword">Password</label>
          </div>

          <div class="mb-3 d-flex justify-content-between align-items-center">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="small text-decoration-none text-primary" id="btn-forgot-password">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-portal w-100 py-3 mt-2"><i class="fas fa-sign-in-alt me-2"></i>Sign In</button>
        </form>

        <div class="mt-4 pt-3 border-top border-light text-center">
          <a href="/index.html" class="text-decoration-none small text-muted"><i class="fas fa-arrow-left me-1"></i> Back to Website</a>
        </div>
        
        <!-- Live Demo Credentials Box -->
        <div class="mt-3 p-3 bg-light rounded-3 text-start small border border-light">
          <div class="fw-bold text-primary mb-1"><i class="fas fa-info-circle me-1"></i> Demo Login Credentials:</div>
          <div class="text-muted mb-1"><strong>Admin:</strong> admin@school.com / password123</div>
          <div class="text-muted mb-1"><strong>Teacher:</strong> teacher@school.com / password123</div>
          <div class="text-muted"><strong>Student:</strong> student@school.com / password123</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase-db.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    let activeRole = 'admin';

    // Handle tab selection clicks
    const tabButtons = document.querySelectorAll('.login-tab-btn');
    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        tabButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeRole = btn.getAttribute('data-role');
        
        // Auto fill demo values based on selection to help user evaluation
        const emailInput = document.getElementById('loginEmail');
        const passInput = document.getElementById('loginPassword');
        if (activeRole === 'admin') {
          emailInput.value = 'admin@school.com';
          passInput.value = 'password123';
        } else if (activeRole === 'teacher') {
          emailInput.value = 'teacher@school.com';
          passInput.value = 'password123';
        } else if (activeRole === 'student') {
          emailInput.value = 'student@school.com';
          passInput.value = 'password123';
        }
      });
    });

    // Auto trigger initial fill
    document.querySelector('.login-tab-btn.active').click();

    // Login Form Submit handler
    document.getElementById('portalLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;

      try {
        showLoader(true);
        const user = await window.Auth.login(email, pass, activeRole);
        showLoader(false);
        showToast(`Login successful! Redirecting to ${activeRole} portal...`, "success");
        setTimeout(() => {
          window.location.href = `dashboard.html?portal=${activeRole}`;
        }, 1000);
      } catch (err) {
        showLoader(false);
        showToast(err.message, "error");
      }
    });

    // Forgot password alert helper
    document.getElementById('btn-forgot-password').addEventListener('click', (e) => {
      e.preventDefault();
      showToast("To reset your password in demo mode, contact the admin. For Firebase configuration, check your email setup console.", "warning");
    });
  </script>
</body>
</html>
